<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Lobbyn — where finance meets easy</title>
<link rel="stylesheet" href="fonts.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: light;
    --ink-950: #0a0c14;
    --ink-900: #10131e;
    --ink-800: #171b2a;
    --ink-700: #212739;
    --ink-600: #2d3550;
    /* Lobbyn brand palette */
    --violet-700: #4b2fd1;  /* Deep */
    --violet-600: #6a4ae8;
    --violet-500: #7b61ff;  /* Primary */
    --violet-100: #ece7ff;
    --lime-500: #c4f542;    /* Accent */
    --lime-600: #aee617;
    --cyan-500: #17b8c4;
    --page: #f5f6f9;
    --surface: #ffffff;
    --surface-sunken: #f0f1f6;
    --ink-primary: #161a26;
    --ink-secondary: #5b6172;
    --ink-muted: #8b90a1;
    --border: rgba(15,16,42,0.09);
    --border-strong: rgba(15,16,42,0.16);
    --shadow-sm: 0 1px 2px rgba(15,16,42,0.06), 0 1px 1px rgba(15,16,42,0.04);
    --shadow-md: 0 4px 10px rgba(15,16,42,0.08), 0 2px 4px rgba(15,16,42,0.05);
    --shadow-lg: 0 12px 28px rgba(15,16,42,0.12), 0 4px 10px rgba(15,16,42,0.06);
    --good: #0ca35c;
    --good-bg: #e3f8ed;
    --warning: #a66c00;
    --warning-bg: #fdf1d6;
    --serious: #c1502c;
    --serious-bg: #fbe8e0;
    --critical: #c22e2e;
    --critical-bg: #fbe4e4;
    --seq-1: #b7a4f2;
    --seq-2: #9678ea;
    --seq-3: #7040d6;
    --seq-4: #4c2aa6;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 18px;
    --font-display: 'Archivo', system-ui, -apple-system, sans-serif;
    --font-brand: 'Unbounded', 'Archivo', system-ui, sans-serif;
    --font-body: 'Manrope', system-ui, -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background: var(--page);
    color: var(--ink-primary);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  h1, h2, h3, h4, .brand, button, .nav-item, .btn { font-family: var(--font-display); }
  .brand-word { font-family: var(--font-brand); font-weight: 700; letter-spacing: -0.3px; }
  .brand-word .dot { color: var(--lime-600); }
  .num, td.num, .stat-value, .badge-count { font-variant-numeric: tabular-nums; font-family: var(--font-mono); }
  a { color: inherit; }
  button { font: inherit; cursor: pointer; }
  input, select, textarea { font: inherit; }

  @media (prefers-reduced-motion: no-preference) {
    .card, .btn, .nav-item, .modal-panel, .toast { transition: box-shadow .18s ease, transform .18s ease, background .18s ease, border-color .18s ease; }
  }

  /* ---------- Layout shell ---------- */
  #app { min-height: 100vh; }
  .shell { display: flex; min-height: 100vh; }
  .sidebar {
    width: 248px; flex-shrink: 0; background: linear-gradient(180deg, var(--ink-900), var(--ink-950));
    color: #dfe1f0; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh;
  }
  .sidebar-brand { padding: 22px 20px 18px; display: flex; align-items: center; gap: 11px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .sidebar-brand .mark { width: 34px; height: 34px; flex-shrink: 0; }
  .sidebar-brand .name { font-size: 16px; color: #fff; line-height: 1.1; }
  .sidebar-brand .sub { font-size: 10.5px; color: #939ab8; letter-spacing: .06em; text-transform: uppercase; margin-top: 3px; }
  .sidebar-nav { flex: 1; padding: 14px 10px; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; }
  .nav-item {
    display: flex; align-items: center; gap: 11px; padding: 10px 12px; border-radius: var(--radius-sm);
    background: transparent; border: none; color: #b7bad3; text-align: left; font-size: 13.5px; font-weight: 600;
    width: 100%;
  }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; opacity: .85; }
  .nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
  .nav-item.active { background: rgba(123,97,255,0.22); color: #d9c9fb; }
  .nav-item.active svg { opacity: 1; }
  .sidebar-foot { padding: 14px; border-top: 1px solid rgba(255,255,255,0.08); }
  .sidebar-user { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: var(--radius-sm); }
  .sidebar-user .avatar {
    width: 32px; height: 32px; border-radius: 50%; background: var(--ink-700); color: #fff; display: flex;
    align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0;
  }
  .sidebar-user .who { flex: 1; min-width: 0; }
  .sidebar-user .who .n { color: #fff; font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sidebar-user .who .r { color: #9098b8; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sidebar-user-editable { cursor: pointer; }
  .sidebar-user-editable:hover { background: rgba(255,255,255,0.06); }
  .logout-btn { background: none; border: none; color: #9098b8; padding: 6px; border-radius: 6px; display: flex; }
  .logout-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }
  .logout-btn svg { width: 16px; height: 16px; }

  .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .topbar {
    height: 64px; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; background: var(--surface); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 5;
  }
  .topbar h1 { margin: 0; font-size: 18px; font-weight: 700; }
  .topbar .sub { font-size: 12.5px; color: var(--ink-muted); margin-top: 1px; }
  .content { padding: 26px 28px 60px; max-width: 1240px; width: 100%; margin: 0 auto; }

  /* ---------- Primitives ---------- */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 9px 16px;
    border-radius: var(--radius-sm); border: 1px solid transparent; font-weight: 700; font-size: 13.5px;
    min-height: 38px; white-space: nowrap;
  }
  .btn svg { width: 15px; height: 15px; }
  .btn-primary { background: var(--violet-500); color: #fff; box-shadow: var(--shadow-sm); }
  .btn-primary:hover { background: var(--violet-600); box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); background: var(--violet-700); }
  .btn-secondary { background: var(--surface); border-color: var(--border-strong); color: var(--ink-primary); }
  .btn-secondary:hover { background: var(--surface-sunken); }
  .btn-ghost { background: transparent; color: var(--ink-secondary); border-color: transparent; }
  .btn-ghost:hover { background: var(--surface-sunken); color: var(--ink-primary); }
  .btn-danger { background: var(--critical-bg); color: var(--critical); }
  .btn-danger:hover { filter: brightness(0.97); }
  .btn-sm { min-height: 30px; padding: 5px 11px; font-size: 12.5px; border-radius: 7px; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-block { width: 100%; }

  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
    box-shadow: var(--shadow-sm); padding: 20px;
  }
  .card-title { font-size: 14px; font-weight: 700; margin: 0 0 4px; display: flex; align-items: center; gap: 8px; }
  .card-sub { font-size: 12px; color: var(--ink-muted); margin: 0 0 14px; }
  .title-icon {
    width: 24px; height: 24px; border-radius: 7px; display: inline-flex; align-items: center;
    justify-content: center; flex-shrink: 0; background: var(--surface-sunken); color: var(--ink-secondary);
  }
  .title-icon svg { width: 13px; height: 13px; }
  .title-icon.violet { background: var(--violet-100); color: var(--violet-700); }

  .grid { display: grid; gap: 16px; }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }
  .grid-3 { grid-template-columns: repeat(3, 1fr); }
  .grid-2 { grid-template-columns: repeat(2, 1fr); }
  @media (max-width: 1080px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } .grid-3 { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 640px) { .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; } }

  .stat-tile { display: flex; flex-direction: column; gap: 6px; }
  .stat-tile .label { font-size: 12px; color: var(--ink-muted); font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
  .stat-tile .value { font-size: 26px; font-weight: 700; letter-spacing: -0.01em; }
  .stat-tile .delta { font-size: 12px; font-weight: 700; }
  .stat-tile .delta.good { color: var(--good); }
  .stat-tile .delta.bad { color: var(--critical); }
  .stat-tile .delta.muted { color: var(--ink-muted); }
  .stat-tile .icon-badge {
    width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center;
    background: var(--violet-100); color: var(--violet-700); margin-bottom: 2px;
  }
  .stat-tile .icon-badge svg { width: 17px; height: 17px; }

  .pill {
    display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 100px;
    font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; white-space: nowrap;
  }
  .pill-booked { background: var(--warning-bg); color: var(--warning); }
  .pill-completed { background: var(--good-bg); color: var(--good); }
  .pill-cancelled { background: var(--critical-bg); color: var(--critical); }
  .pill-income { background: var(--good-bg); color: var(--good); }
  .pill-expense { background: var(--critical-bg); color: var(--critical); }
  .pill-active { background: var(--good-bg); color: var(--good); }
  .pill-inactive { background: var(--surface-sunken); color: var(--ink-muted); }
  .pill-owner { background: var(--violet-100); color: var(--violet-700); }
  .pill-accountant { background: #e8f0fc; color: #2a5b9c; }
  .pill-player { background: var(--surface-sunken); color: var(--ink-secondary); }

  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--ink-muted); font-weight: 700; padding: 0 12px 10px; }
  td { padding: 12px; font-size: 13.5px; border-top: 1px solid var(--border); vertical-align: middle; }
  tr:hover td { background: var(--surface-sunken); }
  .table-wrap { overflow-x: auto; }
  .table-card { padding: 8px 8px 4px; }
  .table-card th:first-child, .table-card td:first-child { padding-left: 16px; }
  .empty-row td { text-align: center; color: var(--ink-muted); padding: 30px 12px; }

  label.field { display: block; margin-bottom: 14px; }
  label.field .lbl { display: block; font-size: 12.5px; font-weight: 700; color: var(--ink-secondary); margin-bottom: 6px; }
  input[type=text], input[type=email], input[type=password], input[type=number], input[type=date],
  input[type=time], input[type=datetime-local], input[type=tel], select, textarea {
    width: 100%; padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong);
    background: var(--surface); font-size: 16px; color: var(--ink-primary); min-height: 44px;
  }
  textarea { min-height: 80px; resize: vertical; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--violet-500); box-shadow: 0 0 0 3px rgba(123,97,255,0.18); }
  .form-row { display: flex; gap: 12px; }
  .form-row > * { flex: 1; min-width: 0; }
  @media (max-width: 560px) { .form-row { flex-direction: column; gap: 0; } }
  .hint { font-size: 11.5px; color: var(--ink-muted); margin-top: 5px; }
  .error-text { font-size: 12.5px; color: var(--critical); margin-top: 6px; }
  .field-divider { display: flex; align-items: center; gap: 8px; margin: 4px 0 14px; }
  .field-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .field-divider span { font-size: 11px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--ink-muted); white-space: nowrap; }
  label.checkbox-field { display: flex; align-items: center; gap: 8px; }
  label.checkbox-field input[type=checkbox] { width: 17px; height: 17px; min-height: 0; flex-shrink: 0; }
  label.checkbox-field .lbl { margin-bottom: 0; }
  input[type=number]:disabled { opacity: .5; }

  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(10,12,20,0.45); display: flex; align-items: center;
    justify-content: center; z-index: 60; padding: 20px; backdrop-filter: blur(2px);
  }
  .modal-panel {
    background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
    width: 100%; max-width: 480px; max-height: 88vh; overflow-y: auto; padding: 24px;
  }
  .modal-panel.wide { max-width: 640px; }
  .modal-head {
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: -24px; z-index: 2; background: var(--surface);
    margin: -24px -24px 16px; padding: 20px 24px 14px;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    border-bottom: 1px solid var(--border);
  }
  .modal-head h3 { margin: 0; font-size: 17px; }
  .modal-close {
    background: var(--surface-sunken); border: none; color: var(--ink-secondary); padding: 8px;
    border-radius: 8px; flex-shrink: 0; display: flex;
  }
  .modal-close:hover { background: var(--border-strong); color: var(--ink-primary); }

  .toast-stack { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 100; }
  .toast {
    background: var(--ink-900); color: #fff; padding: 12px 16px; border-radius: var(--radius-sm); font-size: 13.5px;
    box-shadow: var(--shadow-lg); max-width: 320px; font-weight: 600; display: flex; align-items: center; gap: 8px;
  }
  .toast.success { background: #0d3d29; }
  .toast.error { background: #4a1414; }

  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
  .section-head h2 { margin: 0; font-size: 19px; }
  .filter-bar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .filter-chip {
    padding: 6px 13px; border-radius: 100px; border: 1px solid var(--border-strong); background: var(--surface);
    font-size: 12.5px; font-weight: 700; color: var(--ink-secondary);
  }
  .filter-chip.active { background: var(--ink-900); border-color: var(--ink-900); color: #fff; }

  .kv { display: flex; justify-content: space-between; font-size: 13px; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .kv:last-child { border-bottom: none; }
  .kv .k { color: var(--ink-muted); }
  .kv .v { font-weight: 700; }

  /* ---------- Login ---------- */
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at 30% 20%, var(--ink-700), var(--ink-950)); padding: 20px; }
  .login-card { width: 100%; max-width: 400px; background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); padding: 32px; }
  .login-brand { display: flex; align-items: center; gap: 13px; margin-bottom: 24px; }
  .login-brand .mark { width: 46px; height: 46px; flex-shrink: 0; }
  .login-brand h1 { font-size: 20px; margin: 0; line-height: 1; }
  .login-brand p { font-size: 12.5px; color: var(--ink-muted); margin: 5px 0 0; }
  .login-tabs { display: flex; gap: 4px; background: var(--surface-sunken); padding: 4px; border-radius: 10px; margin-bottom: 20px; }
  .login-tab { flex: 1; padding: 8px; border: none; background: transparent; border-radius: 7px; font-weight: 700; font-size: 13px; color: var(--ink-secondary); }
  .login-tab.active { background: var(--surface); box-shadow: var(--shadow-sm); color: var(--ink-primary); }

  .empty-state { text-align: center; padding: 50px 20px; color: var(--ink-muted); }
  .empty-state svg { width: 40px; height: 40px; margin-bottom: 10px; opacity: .4; }
  .empty-state p { margin: 0; font-size: 13.5px; }

  .divider { height: 1px; background: var(--border); margin: 16px 0; }

  @media (max-width: 860px) {
    .sidebar { position: fixed; left: -260px; z-index: 50; transition: left .2s ease; box-shadow: var(--shadow-lg); }
    .sidebar.open { left: 0; }
    .content { padding: 18px 16px 50px; }
    .topbar { padding: 0 16px; }
    .menu-btn { display: inline-flex !important; }
  }
  .menu-btn { display: none; background: none; border: none; padding: 6px; border-radius: 6px; }
  .menu-btn svg { width: 20px; height: 20px; }
  .sidebar-scrim { display: none; }
  .sidebar-scrim.show { display: block; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 45; }

  .list-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 4px; border-top: 1px solid var(--border); }
  .list-row:first-child { border-top: none; }
  .list-row .main-text { font-size: 13.5px; font-weight: 700; }
  .list-row .sub-text { font-size: 12px; color: var(--ink-muted); margin-top: 1px; }
</style>
</head>

function icon(name){ return ICONS[name] || ''; }

// ============================================================
// Session
// ============================================================
let session = null;
try { session = JSON.parse(localStorage.getItem('oh_session') || 'null'); } catch(e) { session = null; }
function saveSession(){ localStorage.setItem('oh_session', JSON.stringify(session)); }
function isOwner(){ return session && session.type === 'owner'; }
function isMember(){ return session && session.type === 'member'; }
function myRole(){ return isOwner() ? 'owner' : (isMember() ? session.member.role : null); }
function canEdit(){ return isOwner() || myRole() === 'accountant'; }

// Every read/write RPC takes p_passcode + p_member_id + p_password — this builds the
// shared triple from whichever role is logged in.
function authTriple(){
  if (isOwner()) return { p_passcode: session.passcode, p_member_id: null, p_password: null };
  if (isMember()) return { p_passcode: null, p_member_id: session.member.id, p_password: session.password };
  return { p_passcode: null, p_member_id: null, p_password: null };
}

async function rpc(name, params){
  const { data, error } = await sb.rpc(name, params);
  if (error) { toast(error.message || 'Something went wrong', 'error'); throw error; }
  return data;
}

// ============================================================
// Toasts
// ============================================================
function toast(msg, kind){
  const stack = document.getElementById('toastStack');
  const el = document.createElement('div');
  el.className = 'toast' + (kind === 'success' ? ' success' : kind === 'error' ? ' error' : '');
  el.textContent = msg;
  stack.appendChild(el);
  setTimeout(() => el.remove(), 3600);
}

// ============================================================
// Formatting helpers
// ============================================================
function money(n){ return '₹' + Math.round(Number(n)||0).toLocaleString('en-IN'); }
function fmtDate(d){ if(!d) return '—'; const dt = new Date(d); return dt.toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'}); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function initials(name){ return (name||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function statusLabel(s){ return (s||'').replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }
function lobbyTypeLabel(s){ return (s.lobby_type === 'tournament' && s.tournament_name) ? s.tournament_name : statusLabel(s.lobby_type); }
function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function roleLabel(r){ return r === 'owner' ? 'Owner' : r === 'accountant' ? 'Accountant' : 'Player'; }

// ============================================================
// App state / router
// ============================================================
let route = 'dashboard';

function nav(r){ route = r; render(); }

async function render(){
  const app = document.getElementById('app');
  if (!session){
    app.innerHTML = renderLogin();
    bindLogin();
    return;
  }
  if (isOwner() && !session.org){
    try {
      await loadOwnerProfile();
      saveSession();
    } catch (e) {
      session.org = { name: '', ownerName: '', contact: '' };
    }
  }
  app.innerHTML = renderShell();
  bindShell();
  await renderRoute();
  if (isOwner() && !session.org.ownerName) openOrgProfileModal(true);
}

function bindShell(){
  const menuBtn = document.getElementById('menuBtn');
  const sidebar = document.getElementById('sidebar');
  const scrim = document.getElementById('sidebarScrim');
  if (menuBtn) menuBtn.onclick = () => { sidebar.classList.add('open'); scrim.classList.add('show'); };
  if (scrim) scrim.onclick = () => { sidebar.classList.remove('open'); scrim.classList.remove('show'); };
  document.getElementById('logoutBtn').onclick = (e) => {
    e.stopPropagation();
    session = null; localStorage.removeItem('oh_session'); route = 'dashboard'; render();
  };
  const profileTrigger = document.getElementById('orgProfileTrigger');
  if (profileTrigger) profileTrigger.onclick = () => openOrgProfileModal(false);
  document.querySelectorAll('.nav-item[data-nav]').forEach(btn => {
    btn.onclick = () => { nav(btn.dataset.nav); sidebar.classList.remove('open'); scrim.classList.remove('show'); };
  });
}

async function renderRoute(){
  const content = document.getElementById('content');
  const titleEl = document.getElementById('pageTitle');
  const subEl = document.getElementById('pageSub');
  const meta = ROUTES[route] || ROUTES.dashboard;
  titleEl.textContent = meta.title();
  subEl.textContent = meta.sub();
  content.innerHTML = '<div class="empty-state"><p>Loading…</p></div>';
  try {
    const html = await meta.render();
    content.innerHTML = html;
    if (meta.bind) meta.bind();
  } catch(e){
    console.error(e);
    content.innerHTML = '<div class="empty-state"><p>Could not load this page.</p></div>';
  }
}

let loginTab = 'member';

function renderLogin(){
  return `

        <div>

        </div>
      </div>

        <button class="login-tab ${loginTab==='owner'?'active':''}" data-tab="owner">Owner</button>
      </div>
      ${loginTab === 'owner' ? `
      <form id="ownerLoginForm">
        <label class="field"><span class="lbl">Owner passcode</span>
          <input type="password" name="passcode" required autocomplete="current-password">
        </label>
        <div id="loginError" class="error-text" style="display:none"></div>

      </form>` : `
      <form id="memberLoginForm">
        <label class="field"><span class="lbl">Email</span>
          <input type="email" name="email" required autocomplete="username">
        </label>
        <label class="field"><span class="lbl">Password</span>
          <input type="password" name="password" required autocomplete="current-password">
        </label>
        <div id="loginError" class="error-text" style="display:none"></div>
        <button class="btn btn-primary btn-block" type="submit">Sign in</button>
      </form>
      <p class="hint" style="margin-top:16px">Accountant &amp; player accounts are created by the owner. Contact them if you don't have a login yet.</p>
      `}
    </div>
  </div>`;
}

function bindLogin(){
  document.querySelectorAll('.login-tab').forEach(t => t.onclick = () => { loginTab = t.dataset.tab; render(); });
  const errEl = () => document.getElementById('loginError');
  const memForm = document.getElementById('memberLoginForm');
  if (memForm) memForm.onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(memForm);
    const btn = memForm.querySelector('button');
    btn.disabled = true;
    try {
      const data = await rpc('member_login', { p_email: fd.get('email'), p_password: fd.get('password') });
      if (!data.success){
        errEl().textContent = data.error === 'wrong_password' ? 'Incorrect email or password.'
          : data.error === 'no_account' ? 'No account with that email.'
          : data.error === 'account_inactive' ? 'This account has been deactivated.'
          : data.error === 'too_many_attempts' ? 'Too many attempts — try again in a few minutes.'
          : 'Could not sign in.';
        errEl().style.display = 'block';
        return;
      }
      session = { type: 'member', member: data.member, password: fd.get('password') };
      saveSession();
      route = 'dashboard';
      render();
    } finally { btn.disabled = false; }
  };
  const ownerForm = document.getElementById('ownerLoginForm');
  if (ownerForm) ownerForm.onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(ownerForm);
    const btn = ownerForm.querySelector('button');
    btn.disabled = true;
    try {
      const orgId = await rpc('org_owner_verify_passcode', { p_passcode: fd.get('passcode') });
      if (!orgId){
        errEl().textContent = 'Incorrect passcode.';
        errEl().style.display = 'block';
        return;
      }
      session = { type: 'owner', passcode: fd.get('passcode') };
      try {
        await loadOwnerProfile();
      } catch (err) {
        session.org = { name: '', ownerName: '', contact: '' };
      }
      saveSession();
      route = 'dashboard';
      render();
      if (!session.org.ownerName) openOrgProfileModal(true);
    } finally { btn.disabled = false; }
  };
}

// Fetches the org's name/owner-name/contact and caches it on the session so the sidebar can
// show "Acme Esports / Priya Sharma" instead of the generic "Owner" label.
async function loadOwnerProfile(){
  const [profile] = await rpc('owner_get_profile', { p_passcode: session.passcode });
  session.org = { name: profile.org_name, ownerName: profile.owner_name, contact: profile.contact };
}

function openOrgProfileModal(isFirstTime){
  const org = session.org || { name: '', ownerName: '', contact: '' };
  openModal(`
    <div class="modal-panel">
      <div class="modal-head">
        <h3>${isFirstTime ? 'Set up your org' : 'Edit org profile'}</h3>
        ${isFirstTime ? '' : '<button class="modal-close">' + icon('close') + '</button>'}
      </div>
      ${isFirstTime ? '<p class="hint" style="margin:-4px 0 14px">Tell us who\'s running this org — it replaces the generic "Owner" label in the sidebar.</p>' : ''}
      <form id="orgProfileForm">
        <label class="field"><span class="lbl">Org name</span>
          <input type="text" name="org_name" required value="${escapeHtml(org.name || '')}">
        </label>
        <label class="field"><span class="lbl">Owner name</span>
          <input type="text" name="owner_name" required value="${escapeHtml(org.ownerName || '')}">
        </label>
        <label class="field"><span class="lbl">Contact (phone or email)</span>
          <input type="text" name="contact" value="${escapeHtml(org.contact || '')}">
        </label>
        <button class="btn btn-primary btn-block" type="submit">Save</button>
      </form>
    </div>`);
  document.getElementById('orgProfileForm').onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const ok = await rpc('owner_update_profile', {
      p_passcode: session.passcode,
      p_org_name: fd.get('org_name'),
      p_owner_name: fd.get('owner_name'),
      p_contact: fd.get('contact') || ''
    });
    if (ok) {
      session.org = { name: fd.get('org_name').trim(), ownerName: fd.get('owner_name').trim(), contact: (fd.get('contact')||'').trim() };
      saveSession();
      toast('Org profile saved', 'success');
      closeModal();
      render();
    } else {
      toast('Could not save — check both fields are filled in', 'error');
    }
  };
}

function openModal(html){
  closeModal();
  const wrap = document.createElement('div');
  wrap.className = 'modal-backdrop';
  wrap.id = 'modalRoot';
  wrap.innerHTML = html;
  document.body.appendChild(wrap);
  wrap.addEventListener('click', (e) => { if (e.target === wrap) closeModal(); });
  wrap.querySelectorAll('.modal-close').forEach(b => b.onclick = closeModal);
}
function closeModal(){ const el = document.getElementById('modalRoot'); if (el) el.remove(); }

async function renderSlots(){

  slotsData = { slots, teams };
  teamsCache = teams;
  const filtered = slotFilter === 'all' ? slots : slots.filter(s => s.status === slotFilter);
  const rows = filtered.map(s => `
    <tr>
      <td>${fmtDate(s.slot_date)}</td>
      <td>${escapeHtml(s.team_name || '—')}</td>
      <td>${s.start_time ? escapeHtml(s.start_time) + (s.end_time ? '–' + escapeHtml(s.end_time) : '') : '—'}</td>

      <td class="num">${money(s.cost)}</td>

      ${canEdit() ? `<td style="text-align:right;white-space:nowrap">
        <button class="btn btn-ghost btn-sm" data-edit-slot="${s.id}">${icon('edit')}</button>
        <button class="btn btn-ghost btn-sm" data-del-slot="${s.id}">${icon('trash')}</button>

      <thead><tr><th>Date</th><th>Team</th><th>Time</th><th>Type</th><th>Cost</th><th>Status</th>${canEdit() ? '<th></th>' : ''}</tr></thead>

    </table></div>
  </div>`;
}

function bindSlots(){
  document.querySelectorAll('[data-filter]').forEach(b => b.onclick = () => { slotFilter = b.dataset.filter; renderRoute(); });
  if (!canEdit()) return;
  document.getElementById('addSlotBtn').onclick = () => openSlotModal(null);
  document.querySelectorAll('[data-edit-slot]').forEach(b => b.onclick = () => openSlotModal(slotsData.slots.find(s => s.id === b.dataset.editSlot)));
  document.querySelectorAll('[data-del-slot]').forEach(b => b.onclick = async () => {
    if (!confirm('Delete this slot? This cannot be undone.')) return;
    const ok = await rpc('delete_slot', { ...authTriple(), p_slot_id: b.dataset.delSlot });
    if (ok) { toast('Slot deleted', 'success'); renderRoute(); }
  });
}

// ============================================================
// Analytics — cost-bracket performance & a suggested lobby range
// ============================================================
let analyticsTeamFilter = 'all';
const ANALYTICS_MIN_SAMPLE = 2; // brackets need at least this many recorded results to count

function bracketOf(cost){ return Math.floor((Number(cost)||0) / 10) * 10; }

function computeAnalytics(slots){
  const completed = slots.filter(s => s.status === 'completed');
  const withResult = completed.filter(s => s.placement != null);

  const totalSpent = completed.reduce((sum, s) => sum + Number(s.cost || 0), 0);
  const totalPrize = completed.reduce((sum, s) => sum + (s.won_prize ? Number(s.prize_amount || 0) : 0), 0);
  const top3Count = withResult.filter(s => s.placement <= 3).length;

  const byBracket = new Map();
  completed.forEach(s => {
    const b = bracketOf(s.cost);
    if (!byBracket.has(b)) byBracket.set(b, { bracket: b, played: 0, withResult: 0, top3: 0, pointsSum: 0, prize: 0, spent: 0 });
    const row = byBracket.get(b);
    row.played += 1;
    row.spent += Number(s.cost || 0);
    if (s.won_prize) row.prize += Number(s.prize_amount || 0);
    if (s.placement != null){
      row.withResult += 1;
      row.pointsSum += Number(s.points || 0);
      if (s.placement <= 3) row.top3 += 1;
    }
  });

  const brackets = Array.from(byBracket.values()).map(r => ({
    ...r,
    top3Rate: r.withResult ? r.top3 / r.withResult : null,
    avgPoints: r.withResult ? r.pointsSum / r.withResult : null,
  })).sort((a, b) => a.bracket - b.bracket);

  const eligible = brackets.filter(b => b.withResult >= ANALYTICS_MIN_SAMPLE);
  let suggestion = null;
  if (eligible.length){
    const best = eligible.slice().sort((a, b) =>
      b.top3Rate - a.top3Rate || (b.avgPoints||0) - (a.avgPoints||0) || b.withResult - a.withResult
    )[0];
    const ratePct = Math.round(best.top3Rate * 100);
    let reason = `Top 3 in ${best.top3} of ${best.withResult} (${ratePct}%) ₹${best.bracket} lobbies played — the best result rate on record`;
    if (best.avgPoints != null) reason += `, averaging ${Math.round(best.avgPoints)} points`;
    reason += '.';
    const runnerUp = eligible.find(b => b.bracket !== best.bracket && b.top3Rate > 0);
    if (runnerUp) reason += ` ₹${runnerUp.bracket} lobbies are a solid second option (${Math.round(runnerUp.top3Rate*100)}% top 3).`;
    suggestion = { bracket: best.bracket, reason };
  }

  return {
    totals: {
      lobbiesPlayed: completed.length,
      resultsRecorded: withResult.length,
      totalSpent, totalPrize, net: totalPrize - totalSpent,
      top3Count, top3Rate: withResult.length ? top3Count / withResult.length : null,
    },
    brackets, suggestion,
  };
}

async function renderAnalytics(){
  const [slots, teams] = await Promise.all([fetchSlots(), fetchTeams()]);
  teamsCache = teams;

  const lockedTeamId = isMember() ? session.member.team_id : null;
  const scoped = lockedTeamId
    ? slots.filter(s => s.team_id === lockedTeamId)
    : (analyticsTeamFilter === 'all' ? slots : slots.filter(s => s.team_id === analyticsTeamFilter));

  const a = computeAnalytics(scoped);
  const t = a.totals;

  const teamPicker = (!lockedTeamId && teams.length) ? `
    <select id="analyticsTeamSelect" style="max-width:220px">
      <option value="all" ${analyticsTeamFilter==='all'?'selected':''}>All teams</option>
      ${teams.map(tm => `<option value="${tm.id}" ${analyticsTeamFilter===tm.id?'selected':''}>${escapeHtml(tm.name)}</option>`).join('')}
    </select>` : '';

  const bracketRows = a.brackets.map(b => `
    <tr>
      <td>₹${b.bracket}${b.bracket === a.suggestion?.bracket ? ' <span class="pill pill-active">Suggested</span>' : ''}</td>
      <td class="num">${b.played}</td>
      <td class="num">${b.withResult}</td>
      <td class="num">${b.top3}</td>
      <td class="num">${b.top3Rate == null ? '—' : Math.round(b.top3Rate*100) + '%'}</td>
      <td class="num">${b.avgPoints == null ? '—' : Math.round(b.avgPoints)}</td>
      <td class="num">${money(b.prize)}</td>
      <td class="num">${money(b.spent)}</td>
    </tr>`).join('');

  return `
  <div class="section-head">
    <h2>Analytics</h2>
    ${teamPicker}
  </div>
  <div class="grid grid-4" style="margin-bottom:16px">
    <div class="card stat-tile"><div class="label">Lobbies Played</div><div class="value num">${t.lobbiesPlayed}</div></div>
    <div class="card stat-tile"><div class="label">Top 3 Rate</div><div class="value num">${t.top3Rate == null ? '—' : Math.round(t.top3Rate*100) + '%'}</div><div class="delta muted">${t.top3Count} of ${t.resultsRecorded} recorded</div></div>
    <div class="card stat-tile"><div class="label">Total Prize Won</div><div class="value num">${money(t.totalPrize)}</div></div>
    <div class="card stat-tile"><div class="label">Net (Prize − Spend)</div><div class="value num" style="color:${t.net >= 0 ? 'var(--good)' : 'var(--critical)'}">${money(t.net)}</div></div>
  </div>
  <div class="card" style="margin-bottom:16px">
    <div class="card-title"><span class="title-icon violet">${icon('trophy')}</span> Suggested lobby range</div>
    ${a.suggestion
      ? `<p style="margin:0;font-size:14px;line-height:1.6">Aim for <b>₹${a.suggestion.bracket} lobbies</b>. ${escapeHtml(a.suggestion.reason)}</p>`
      : `<div class="empty-state"><p>Not enough completed lobbies with a recorded placement yet (need at least ${ANALYTICS_MIN_SAMPLE} in the same ₹10 bracket). Enter placement &amp; points when editing a completed slot to build this up.</p></div>`}
  </div>
  <div class="card table-card">
    <div class="card-title" style="padding:16px 16px 0">Performance by lobby cost</div>
    <div class="card-sub" style="padding:0 16px">Grouped in ₹10 brackets</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Bracket</th><th>Played</th><th>Results</th><th>Top 3</th><th>Top 3 Rate</th><th>Avg Points</th><th>Prize Won</th><th>Spent</th></tr></thead>
      <tbody>${bracketRows || '<tr class="empty-row"><td colspan="8">No completed lobbies yet.</td></tr>'}</tbody>
    </table></div>
  </div>`;
}

}

    if (ok) { toast('Member deleted', 'success'); renderRoute(); }
  });
}

function openMemberModal(member){
  const isNew = !member;
  const teamOptions = teamsCache.map(t => `<option value="${t.id}" ${!isNew && member.team_id===t.id ? 'selected' : ''}>${escapeHtml(t.name)}</option>`).join('');
  openModal(`
    <div class="modal-panel">
      <div class="modal-head"><h3>${isNew ? 'Add Member' : 'Edit Member'}</h3><button class="modal-close">${icon('close')}</button></div>
      <form id="memForm">
        <label class="field"><span class="lbl">Name</span><input type="text" name="name" required value="${isNew ? '' : escapeHtml(member.name)}"></label>
        <label class="field"><span class="lbl">Email</span><input type="email" name="email" required ${isNew ? '' : 'readonly'} value="${isNew ? '' : escapeHtml(member.email)}"></label>
        <label class="field"><span class="lbl">Phone</span><input type="tel" name="phone" value="${isNew ? '' : escapeHtml(member.phone || '')}"></label>
        <label class="field"><span class="lbl">Role</span>
          <select name="role">
            <option value="player" ${!isNew && member.role==='player' ? 'selected' : ''}>Player (view only)</option>
            <option value="accountant" ${!isNew && member.role==='accountant' ? 'selected' : ''}>Accountant (edit)</option>
          </select>
        </label>
        <label class="field"><span class="lbl">Team</span>
          <select name="team_id"><option value="">— None —</option>${teamOptions}</select>
        </label>
        ${isNew ? `<label class="field"><span class="lbl">Initial password</span><input type="text" name="password" required></label>
        <p class="hint" style="margin-top:-10px;margin-bottom:14px">Shown only once here — copy it and share with them directly.</p>` : ''}
        ${!isNew ? `<label class="field"><span class="lbl">Status</span><select name="active"><option value="true" ${member.active ? 'selected' : ''}>Active</option><option value="false" ${!member.active ? 'selected' : ''}>Inactive</option></select></label>` : ''}
        <button class="btn btn-primary btn-block" type="submit">${isNew ? 'Create member' : 'Save changes'}</button>
      </form>
    </div>`);
  document.getElementById('memForm').onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    if (isNew){
      const res = await rpc('owner_create_member', {
        p_passcode: session.passcode, p_name: fd.get('name'), p_email: fd.get('email'), p_phone: fd.get('phone') || '',
        p_password: fd.get('password'), p_role: fd.get('role'), p_team_id: fd.get('team_id') || null
      });
      if (res.success) { toast('Member created', 'success'); closeModal(); renderRoute(); } else toast(res.error || 'Could not create', 'error');
    } else {
      const ok = await rpc('owner_update_member', {
        p_passcode: session.passcode, p_member_id: member.id, p_name: fd.get('name'), p_phone: fd.get('phone') || '',
        p_role: fd.get('role'), p_team_id: fd.get('team_id') || null, p_active: fd.get('active') === 'true'
      });
      if (ok) { toast('Member updated', 'success'); closeModal(); renderRoute(); }
    }
  };
}

function openResetPasswordModal(memberId){
  openModal(`
    <div class="modal-panel">
      <div class="modal-head"><h3>Reset password</h3><button class="modal-close">${icon('close')}</button></div>
      <form id="resetForm">
        <label class="field"><span class="lbl">New password</span><input type="text" name="password" required></label>
        <button class="btn btn-primary btn-block" type="submit">Reset password</button>
      </form>
    </div>`);
  document.getElementById('resetForm').onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const ok = await rpc('owner_reset_member_password', { p_passcode: session.passcode, p_member_id: memberId, p_new_password: fd.get('password') });
    if (ok) { toast('Password reset', 'success'); closeModal(); }
  };
}
