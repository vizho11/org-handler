<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Org Handler — Superadmin</title>
<link rel="stylesheet" href="fonts.css">
<style>
  :root {
    color-scheme: light;
    --ink-950: #0a0c14;
    --ink-900: #10131e;
    --ink-800: #171b2a;
    --violet-700: #5b2fc2;
    --violet-600: #7040d6;
    --violet-500: #8b5cf6;
    --violet-100: #ede4fd;
    --page: #f5f6f9;
    --surface: #ffffff;
    --surface-sunken: #f0f1f6;
    --ink-primary: #161a26;
    --ink-secondary: #5b6172;
    --ink-muted: #8b90a1;
    --border: rgba(15,16,42,0.09);
    --border-strong: rgba(15,16,42,0.16);
    --shadow-sm: 0 1px 2px rgba(15,16,42,0.06), 0 1px 1px rgba(15,16,42,0.04);
    --shadow-md: 0 4px 10px rgba(15,16,42,0.08), 0 2px 4px rgba(15,16,42,0.05);
    --shadow-lg: 0 12px 28px rgba(15,16,42,0.12), 0 4px 10px rgba(15,16,42,0.06);
    --good: #0ca35c;
    --good-bg: #e3f8ed;
    --critical: #c22e2e;
    --critical-bg: #fbe4e4;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 18px;
    --font-display: 'Archivo', system-ui, -apple-system, sans-serif;
    --font-body: 'Manrope', system-ui, -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: var(--font-body); background: var(--page); color: var(--ink-primary); -webkit-font-smoothing: antialiased; min-height: 100vh; }
  h1, h2, h3, button, .btn { font-family: var(--font-display); }
  .num, td.num { font-variant-numeric: tabular-nums; font-family: var(--font-mono); }
  button { font: inherit; cursor: pointer; }
  input, select { font: inherit; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between; padding: 18px 28px;
    background: var(--surface); border-bottom: 1px solid var(--border);
  }
  .topbar .brand { display: flex; align-items: center; gap: 10px; }
  .topbar .brand .mark {
    width: 32px; height: 32px; border-radius: 9px; background: linear-gradient(145deg, var(--violet-500), var(--violet-700));
    display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 13px;
  }
  .topbar .brand .name { font-weight: 700; font-size: 15px; }
  .topbar .brand .sub { font-size: 11px; color: var(--ink-muted); }

  .content { max-width: 1000px; margin: 0 auto; padding: 26px 28px 60px; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 9px 16px;
    border-radius: var(--radius-sm); border: 1px solid transparent; font-weight: 700; font-size: 13.5px;
    min-height: 38px; white-space: nowrap;
  }
  .btn svg { width: 15px; height: 15px; }
  .btn-primary { background: linear-gradient(160deg, var(--violet-500), var(--violet-700)); color: #fff; box-shadow: var(--shadow-sm); }
  .btn-primary:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .btn-secondary { background: var(--surface); border-color: var(--border-strong); color: var(--ink-primary); }
  .btn-secondary:hover { background: var(--surface-sunken); }
  .btn-ghost { background: transparent; color: var(--ink-secondary); border-color: transparent; }
  .btn-ghost:hover { background: var(--surface-sunken); color: var(--ink-primary); }
  .btn-sm { min-height: 30px; padding: 5px 11px; font-size: 12.5px; border-radius: 7px; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-block { width: 100%; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); padding: 20px; }
  .table-card { padding: 8px 8px 4px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--ink-muted); font-weight: 700; padding: 0 12px 10px; }
  td { padding: 12px; font-size: 13.5px; border-top: 1px solid var(--border); vertical-align: middle; }
  tr:hover td { background: var(--surface-sunken); }
  .table-wrap { overflow-x: auto; }
  .table-card th:first-child, .table-card td:first-child { padding-left: 16px; }
  .empty-row td { text-align: center; color: var(--ink-muted); padding: 30px 12px; }

  .pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 100px; font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; white-space: nowrap; }
  .pill-active { background: var(--good-bg); color: var(--good); }
  .pill-inactive { background: var(--surface-sunken); color: var(--ink-muted); }

  label.field { display: block; margin-bottom: 14px; }
  label.field .lbl { display: block; font-size: 12.5px; font-weight: 700; color: var(--ink-secondary); margin-bottom: 6px; }
  input[type=text], input[type=password] {
    width: 100%; padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong);
    background: var(--surface); font-size: 16px; color: var(--ink-primary); min-height: 44px;
  }
  input:focus { outline: none; border-color: var(--violet-500); box-shadow: 0 0 0 3px rgba(139,92,246,0.16); }
  .hint { font-size: 11.5px; color: var(--ink-muted); margin-top: 5px; }
  .error-text { font-size: 12.5px; color: var(--critical); margin-top: 6px; }

  .modal-backdrop { position: fixed; inset: 0; background: rgba(10,12,20,0.45); display: flex; align-items: center; justify-content: center; z-index: 60; padding: 20px; backdrop-filter: blur(2px); }
  .modal-panel { background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); width: 100%; max-width: 440px; max-height: 88vh; overflow-y: auto; padding: 24px; }
  .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .modal-head h3 { margin: 0; font-size: 17px; }
  .modal-close { background: var(--surface-sunken); border: none; color: var(--ink-secondary); padding: 8px; border-radius: 8px; display: flex; }
  .modal-close:hover { background: var(--border-strong); color: var(--ink-primary); }

  .toast-stack { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 100; }
  .toast { background: var(--ink-900); color: #fff; padding: 12px 16px; border-radius: var(--radius-sm); font-size: 13.5px; box-shadow: var(--shadow-lg); max-width: 320px; font-weight: 600; }
  .toast.success { background: #0d3d29; }
  .toast.error { background: #4a1414; }

  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
  .section-head h2 { margin: 0; font-size: 19px; }

  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at 30% 20%, var(--ink-700, #212739), var(--ink-950)); padding: 20px; }
  .login-card { width: 100%; max-width: 380px; background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); padding: 32px; }
  .login-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
  .login-brand .mark { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(145deg, var(--violet-500), var(--violet-700)); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 18px; }
  .login-brand h1 { font-size: 17px; margin: 0; }
  .login-brand p { font-size: 12px; color: var(--ink-muted); margin: 2px 0 0; }

  .empty-state { text-align: center; padding: 50px 20px; color: var(--ink-muted); }
  .empty-state p { margin: 0; font-size: 13.5px; }
</style>
</head>
<body>
<div id="app"></div>
<div class="toast-stack" id="toastStack"></div>
<script src="vendor-supabase-js.js"></script>
<script>
const SUPABASE_URL = 'https://ixfuyoqrqaftuihwcvjw.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4ZnV5b3FycWFmdHVpaHdjdmp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NjQyNDIsImV4cCI6MjA5OTU0MDI0Mn0.k7x0WvHF92xDft3lUGanIU_ha9rEjPZ8C65knPFtQkQ';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const ICONS = {
  plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>',
  close: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>',
  key: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="15" r="4"/><path d="M10.8 12.2L20 3M16 7l3 3M13 10l2 2"/></svg>',
  power: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v10"/><path d="M18.4 6.6a9 9 0 11-12.8 0"/></svg>',
  logout: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>',
};
function icon(name){ return ICONS[name] || ''; }

let passcode = null;
try { passcode = JSON.parse(localStorage.getItem('oh_superadmin') || 'null'); } catch(e) { passcode = null; }
function savePasscode(){ localStorage.setItem('oh_superadmin', JSON.stringify(passcode)); }

async function rpc(name, params){
  const { data, error } = await sb.rpc(name, params);
  if (error) { toast(error.message || 'Something went wrong', 'error'); throw error; }
  return data;
}
function toast(msg, kind){
  const stack = document.getElementById('toastStack');
  const el = document.createElement('div');
  el.className = 'toast' + (kind === 'success' ? ' success' : kind === 'error' ? ' error' : '');
  el.textContent = msg;
  stack.appendChild(el);
  setTimeout(() => el.remove(), 3600);
}
function fmtDate(d){ if(!d) return '—'; const dt = new Date(d); return dt.toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'}); }
function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function render(){
  const app = document.getElementById('app');
  if (!passcode){
    app.innerHTML = renderLogin();
    bindLogin();
    return;
  }
  app.innerHTML = renderShell();
  bindShell();
  await renderOrgs();
}

function renderLogin(){
  return `
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <div class="mark">SA</div>
        <div>
          <h1>Org Handler</h1>
          <p>Superadmin — create &amp; manage customer orgs</p>
        </div>
      </div>
      <form id="loginForm">
        <label class="field"><span class="lbl">Superadmin passcode</span>
          <input type="password" name="passcode" required autocomplete="current-password">
        </label>
        <div id="loginError" class="error-text" style="display:none"></div>
        <button class="btn btn-primary btn-block" type="submit">Sign in</button>
      </form>
    </div>
  </div>`;
}

function bindLogin(){
  const form = document.getElementById('loginForm');
  const errEl = document.getElementById('loginError');
  form.onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(form);
    const btn = form.querySelector('button');
    btn.disabled = true;
    try {
      const candidate = fd.get('passcode');
      const ok = await rpc('superadmin_verify_passcode', { p_passcode: candidate });
      if (!ok){
        errEl.textContent = 'Incorrect passcode.';
        errEl.style.display = 'block';
        return;
      }
      passcode = candidate;
      savePasscode();
      render();
    } finally { btn.disabled = false; }
  };
}

function renderShell(){
  return `
  <div class="topbar">
    <div class="brand">
      <div class="mark">SA</div>
      <div>
        <div class="name">Org Handler — Superadmin</div>
        <div class="sub">Create &amp; manage customer orgs</div>
      </div>
    </div>
    <button class="btn btn-ghost" id="logoutBtn">${icon('logout')} Log out</button>
  </div>
  <div class="content" id="content"></div>`;
}

function bindShell(){
  document.getElementById('logoutBtn').onclick = () => {
    passcode = null; localStorage.removeItem('oh_superadmin'); render();
  };
}

let orgsData = [];

async function renderOrgs(){
  const content = document.getElementById('content');
  content.innerHTML = '<div class="empty-state"><p>Loading…</p></div>';
  let orgs;
  try {
    orgs = await rpc('superadmin_list_orgs', { p_super_passcode: passcode });
  } catch(e) {
    content.innerHTML = '<div class="empty-state"><p>Could not load orgs — passcode may be invalid.</p></div>';
    return;
  }
  orgsData = orgs;
  const rows = orgs.map(o => `
    <tr>
      <td>${escapeHtml(o.name)}</td>
      <td><span class="pill pill-${o.active ? 'active' : 'inactive'}">${o.active ? 'Active' : 'Inactive'}</span></td>
      <td class="num">${o.team_count}</td>
      <td class="num">${o.member_count}</td>
      <td>${fmtDate(o.created_at)}</td>
      <td style="text-align:right;white-space:nowrap">
        <button class="btn btn-ghost btn-sm" data-reset-org="${o.id}">${icon('key')} Reset passcode</button>
        <button class="btn btn-ghost btn-sm" data-toggle-org="${o.id}" data-active="${o.active}">${icon('power')} ${o.active ? 'Deactivate' : 'Activate'}</button>
      </td>
    </tr>`).join('');
  content.innerHTML = `
    <div class="section-head">
      <h2>Customer orgs</h2>
      <button class="btn btn-primary" id="addOrgBtn">${icon('plus')} New Org</button>
    </div>
    <div class="card table-card">
      <div class="table-wrap"><table>
        <thead><tr><th>Org</th><th>Status</th><th>Teams</th><th>Members</th><th>Created</th><th></th></tr></thead>
        <tbody>${rows || '<tr class="empty-row"><td colspan="6">No orgs yet — create the first one.</td></tr>'}</tbody>
      </table></div>
    </div>`;
  bindOrgs();
}

function bindOrgs(){
  document.getElementById('addOrgBtn').onclick = openCreateOrgModal;
  document.querySelectorAll('[data-reset-org]').forEach(b => b.onclick = () => openResetPasscodeModal(b.dataset.resetOrg));
  document.querySelectorAll('[data-toggle-org]').forEach(b => b.onclick = async () => {
    const currentlyActive = b.dataset.active === 'true';
    const org = orgsData.find(o => o.id === b.dataset.toggleOrg);
    if (!confirm(`${currentlyActive ? 'Deactivate' : 'Activate'} "${org ? org.name : 'this org'}"? ${currentlyActive ? 'The owner and every member will be locked out immediately.' : 'The owner and members will be able to log in again.'}`)) return;
    const ok = await rpc('superadmin_set_org_active', { p_super_passcode: passcode, p_org_id: b.dataset.toggleOrg, p_active: !currentlyActive });
    if (ok) { toast(currentlyActive ? 'Org deactivated' : 'Org activated', 'success'); renderOrgs(); }
  });
}

function openModal(html){
  closeModal();
  const wrap = document.createElement('div');
  wrap.className = 'modal-backdrop';
  wrap.id = 'modalRoot';
  wrap.innerHTML = html;
  document.body.appendChild(wrap);
  wrap.addEventListener('click', (e) => { if (e.target === wrap) closeModal(); });
  wrap.querySelectorAll('.modal-close').forEach(b => b.onclick = closeModal);
}
function closeModal(){ const el = document.getElementById('modalRoot'); if (el) el.remove(); }

function randomPasscode(){
  const bytes = new Uint8Array(9);
  crypto.getRandomValues(bytes);
  return btoa(String.fromCharCode(...bytes)).replace(/[+/=]/g, '').slice(0, 12);
}

function openCreateOrgModal(){
  openModal(`
    <div class="modal-panel">
      <div class="modal-head"><h3>New Org</h3><button class="modal-close">${icon('close')}</button></div>
      <form id="orgForm">
        <label class="field"><span class="lbl">Org name</span><input type="text" name="name" required placeholder="e.g. Phantom Esports"></label>
        <label class="field"><span class="lbl">Owner passcode</span><input type="text" name="passcode" required value="${randomPasscode()}"></label>
        <p class="hint" style="margin-top:-10px;margin-bottom:14px">Shown only once here — copy it and send it to the org's manager directly. They'll use it to sign into the Owner tab.</p>
        <button class="btn btn-primary btn-block" type="submit">Create org</button>
      </form>
    </div>`);
  document.getElementById('orgForm').onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const res = await rpc('superadmin_create_org', { p_super_passcode: passcode, p_org_name: fd.get('name'), p_owner_passcode: fd.get('passcode') });
    if (res.success) { toast('Org created', 'success'); closeModal(); renderOrgs(); } else toast(res.error || 'Could not create org', 'error');
  };
}

function openResetPasscodeModal(orgId){
  openModal(`
    <div class="modal-panel">
      <div class="modal-head"><h3>Reset owner passcode</h3><button class="modal-close">${icon('close')}</button></div>
      <form id="resetForm">
        <label class="field"><span class="lbl">New owner passcode</span><input type="text" name="passcode" required value="${randomPasscode()}"></label>
        <p class="hint" style="margin-top:-10px;margin-bottom:14px">Shown only once here — the org's previous passcode stops working immediately.</p>
        <button class="btn btn-primary btn-block" type="submit">Reset passcode</button>
      </form>
    </div>`);
  document.getElementById('resetForm').onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const ok = await rpc('superadmin_reset_org_passcode', { p_super_passcode: passcode, p_org_id: orgId, p_new_owner_passcode: fd.get('passcode') });
    if (ok) { toast('Passcode reset', 'success'); closeModal(); }
  };
}

document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
